backend:
  name: github
  repo: sagar-softhealer/softhealer-uk-website
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/pages/home.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Showcase Title", name: "showcase_title", widget: "string" }
          - { label: "Showcase Description", name: "showcase_description", widget: "text" }
          - label: "Showcase Features"
            name: "showcase_features"
            widget: "list"
            fields:
              - { label: "Feature Name", name: "title", widget: "string" }
              - { label: "Feature Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "about"
        label: "About Page"
        file: "src/content/pages/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Story Title", name: "story_title", widget: "string" }
          - { label: "Story Body", name: "story_body", widget: "text" }
          - label: "Stats Counters"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Stat Number", name: "number", widget: "string" }
              - { label: "Stat Label", name: "label", widget: "string" }
          - label: "Core Values"
            name: "values"
            widget: "list"
            fields:
              - { label: "Icon Emoji", name: "icon", widget: "string" }
              - { label: "Value Title", name: "title", widget: "string" }
              - { label: "Value Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "services"
        label: "Services Page"
        file: "src/content/pages/services.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - label: "Services Catalog"
            name: "services"
            widget: "list"
            fields:
              - { label: "Service Icon Emoji", name: "icon", widget: "string" }
              - { label: "Service Title", name: "title", widget: "string" }
              - { label: "Service Description", name: "description", widget: "text" }
              - label: "Features List"
                name: "features"
                widget: "list"
                field: { label: "Feature", name: "feature", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "contact"
        label: "Contact Page"
        file: "src/content/pages/contact.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "blogs"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blogs"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Softhealer Team" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "careers"
    label: "Careers"
    label_singular: "Job Opening"
    folder: "src/content/careers"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Job Title", name: "title", widget: "string" }
      - { label: "Department", name: "department", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Job Type", name: "type", widget: "string" }
      - { label: "Salary Range", name: "salary", widget: "string", required: false }
      - { label: "Job Description", name: "body", widget: "markdown" }

  - name: "portfolios"
    label: "Portfolios"
    label_singular: "Case Study"
    folder: "src/content/portfolios"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Client Name", name: "client", widget: "string" }
      - { label: "Year Completed", name: "year", widget: "string" }
      - { label: "Project Image", name: "image", widget: "image", required: false }
      - { label: "Brief Summary", name: "description", widget: "string" }
      - { label: "Detailed Case Study", name: "body", widget: "markdown" }

  - name: "team"
    label: "Team Members"
    label_singular: "Team Member"
    folder: "src/content/team"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Member Name", name: "name", widget: "string" }
      - { label: "Role / Title", name: "role", widget: "string" }
      - { label: "Profile Photo", name: "image", widget: "image", required: false }
      - { label: "Brief Bio", name: "bio", widget: "string", required: false }
      - { label: "Long Biography", name: "body", widget: "markdown" }

  - name: "faq"
    label: "FAQs"
    label_singular: "FAQ"
    folder: "src/content/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Question", name: "question", widget: "string" }
      - { label: "Display Order", name: "order", widget: "number", required: false }
      - { label: "Answer", name: "body", widget: "markdown" }

  - name: "testimonials"
    label: "Testimonials"
    label_singular: "Testimonial"
    folder: "src/content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client Name", name: "author", widget: "string" }
      - { label: "Company / Role", name: "company", widget: "string" }
      - { label: "Rating Stars", name: "rating", widget: "number", default: 5 }
      - { label: "Quote", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Settings"
    files:
      - name: "theme"
        label: "Theme Colors"
        file: "src/content/settings/theme.json"
        fields:
          - { label: "Primary Theme Color", name: "primary_color", widget: "color", default: "#534ab7" }
          - { label: "Secondary Theme Color", name: "secondary_color", widget: "color", default: "#00d2ff" }
