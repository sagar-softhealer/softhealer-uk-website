# CloudCannon Configuration File
# Reference: https://cloudcannon.com/documentation/articles/configuration-reference/

collections_config:
  pages:
    name: Pages
    path: src/content/pages
    output: true
    icon: description

  blogs:
    name: Blog Posts
    path: src/content/blogs
